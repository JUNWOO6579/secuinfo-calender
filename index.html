<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECUINFO | 생산팀 연차 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Pretendard:wght@400;600;800&display=swap');
        
        :root {
            --vms-bg: #020617;
            --vms-surface: rgba(15, 23, 42, 0.7);
            --vms-header-bg: rgba(30, 41, 59, 0.5);
            --vms-border: rgba(51, 65, 85, 0.5);
            --vms-accent-blue: #0ea5e9;
            --vms-accent-cyan: #22d3ee;
            --vms-accent-green: #92c83e; 
            --vms-text: #f1f5f9;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--vms-bg);
            color: var(--vms-text);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(14, 165, 233, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                linear-gradient(rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.95));
            z-index: -2;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
        }

        .vms-header {
            background: var(--vms-header-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(14, 165, 233, 0.3);
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 50;
            flex-shrink: 0;
        }

        .vms-sidebar {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--vms-border);
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .vms-main {
            flex: 1;
            background: transparent;
            position: relative;
            overflow-y: auto;
            min-width: 0;
        }

        .brand-logo .logo-main {
            font-weight: 900;
            font-size: 26px;
            letter-spacing: -1.5px;
            display: flex;
            align-items: baseline;
        }
        .logo-en { color: #fff; font-style: italic; margin-right: 6px; }
        .logo-ko { color: var(--vms-accent-green); }
        .logo-dot { color: var(--vms-accent-cyan); animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1.2); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* 캘린더 기본 스타일 */
        .fc { border: none !important; color: #f1f5f9; height: 100%; padding: 15px; }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid rgba(51, 65, 85, 0.4) !important; }
        
        .fc .fc-button-primary { 
            background: rgba(30, 41, 59, 0.6); border: 1px solid var(--vms-border); color: #94a3b8; 
            font-size: 0.75rem; font-weight: bold; padding: 6px 14px;
        }
        .fc .fc-button-active { background: var(--vms-accent-blue) !important; color: #fff !important; }

        /* 모바일 대응 통합 수정 */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; min-height: 100vh; }
            .vms-header { 
                padding: 0 0.75rem; 
                flex-direction: row !important; 
                height: 60px; 
                justify-content: space-between;
            }
            .vms-header h1 { 
                display: block !important; 
                font-size: 9px !important; 
                max-width: 120px;
                white-space: nowrap;
                overflow: hidden;
            }
            .brand-logo .logo-main { font-size: 14px; }
            
            .vms-sidebar { display: none; }
            .main-container { flex-direction: column !important; }
            
            /* 캘린더 사라짐 방지: 최소 높이 강제 지정 */
            .vms-main { 
                min-height: 650px !important; 
                height: 650px !important; 
                flex: none; 
                width: 100%; 
            }
            
            /* 캘린더 상단바 한 줄 정렬 */
            .fc { padding: 5px !important; }
            .fc .fc-toolbar { 
                display: flex !important;
                flex-direction: row !important; 
                flex-wrap: nowrap !important;
                justify-content: space-between !important;
                align-items: center !important;
                margin-bottom: 0.5em !important;
            }
            .fc .fc-toolbar-title { 
                font-size: 0.75rem !important; 
                margin: 0 2px !important;
                flex-shrink: 0;
            }
            .fc .fc-button-group { display: flex !important; gap: 1px !important; }
            .fc .fc-button { 
                padding: 2px 5px !important; 
                font-size: 0.55rem !important; 
                height: 28px !important;
            }
            .fc .fc-today-button { height: 28px !important; font-size: 0.55rem !important; }
        }

        /* 공통 모달 및 기타 스타일 유지... */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(8px); z-index: 10000; align-items: center; justify-content: center; padding: 1rem;
        }
        .vms-modal {
            background: #0f172a; border: 1px solid rgba(14, 165, 233, 0.3); border-top: 4px solid var(--vms-accent-green);
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); border-radius: 12px;
        }
        .vms-input { background: #1e293b; border: 1px solid rgba(51, 65, 85, 0.6); color: #fff; width: 100%; padding: 14px; border-radius: 8px; outline: none; }
        .vms-footer { height: 28px; background: rgba(15, 23, 42, 0.8); border-top: 1px solid var(--vms-border); font-size: 9px; display: flex; align-items: center; padding: 0 15px; color: #94a3b8; flex-shrink: 0; }
    </style>
</head>
<body>

    <header class="vms-header">
        <div class="flex items-center gap-2 md:gap-8">
            <div class="brand-logo">
                <div class="logo-main">
                    <span class="logo-en">SECUINFO</span>
                    <span class="logo-ko hidden xs:inline">시큐인포</span>
                    <span class="logo-dot">_</span>
                </div>
            </div>
            <div class="h-6 w-[1px] bg-slate-700/50 hidden lg:block"></div>
            <h1 class="font-bold text-slate-400 text-[10px] md:text-sm tracking-[0.05em]">
                생산팀 연차 공유 시스템
            </h1>
        </div>
        <div class="flex items-center">
            <div id="auth-status" class="mono text-[8px] md:text-[9px] text-emerald-400 border border-emerald-500/20 px-2 py-1 rounded-full font-bold uppercase">
                Live_Connected
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden main-container">
        <aside class="vms-sidebar hidden md:flex">
            <div class="p-6 border-b border-white/5">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-5 italic border-l-2 border-indigo-500 pl-3">Member Colors</p>
                <div class="space-y-4 text-[11px] text-slate-400 leading-relaxed bg-indigo-500/5 p-4 rounded-xl border border-indigo-500/10">
                    <p>인원별 고유 색상 자동 지정 시스템</p>
                </div>
            </div>
            <div class="p-6 flex-1 overflow-y-auto">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">사용 안내</p>
                <div class="space-y-4 text-[11px] text-slate-400">
                    <p>• 날짜 클릭: 일정 등록</p>
                    <p>• 기록 클릭: 일정 취소</p>
                </div>
            </div>
            <div class="p-5 text-center border-t border-white/5">
                <span class="text-[9px] text-slate-600 mono uppercase font-bold">Copyright © 2026 옥준우</span>
            </div>
        </aside>

        <main class="vms-main">
            <div id="calendar"></div>
        </main>
    </div>

    <footer class="vms-footer flex justify-between select-none mono uppercase tracking-widest">
        <span>● SYSTEM_READY</span>
        <span>Copyright © 2026 옥준우</span>
    </footer>

    <div id="modal-overlay" class="modal-overlay">
        <div class="vms-modal shadow-2xl animate-in zoom-in-95 duration-200">
            <div class="bg-[#1e293b] p-4 flex justify-between items-center border-b border-white/5">
                <span class="text-[11px] font-bold text-cyan-400 mono">연차 계획 등록</span>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-8 space-y-6">
                <input type="text" id="user-name" class="vms-input" placeholder="성함 입력">
                <select id="vacation-type" onchange="toggleTimeInput()" class="vms-input">
                    <option value="연차">연차 (종일)</option>
                    <option value="오전반차">오전반차</option>
                    <option value="오후반차">오후반차</option>
                    <option value="시간차">시간차 (부분)</option>
                </select>
                <div id="time-input-container" class="hidden grid grid-cols-2 gap-4">
                    <input type="time" id="start-time" class="vms-input !p-3 text-xs" value="08:00">
                    <input type="time" id="end-time" class="vms-input !p-3 text-xs" value="09:00">
                </div>
                <div class="flex gap-4">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-slate-800 text-slate-300 rounded-xl">취소</button>
                    <button id="confirm-btn" class="flex-1 py-4 bg-indigo-600 text-white rounded-xl">등록</button>
                </div>
            </div>
        </div>
    </div>

    <div id="delete-modal-overlay" class="modal-overlay">
        <div class="vms-modal shadow-2xl animate-in zoom-in-95 duration-200 border-t-rose-500">
            <div class="bg-[#1e293b] p-4 flex justify-between items-center border-b border-white/5">
                <span class="text-[11px] font-bold text-rose-400 mono">취소 확인</span>
            </div>
            <div class="p-10 space-y-6">
                <p id="delete-msg" class="text-sm font-semibold text-slate-300 text-center">연차 계획을 취소하시겠습니까?</p>
                <div class="flex gap-4">
                    <button onclick="closeDeleteModal()" class="flex-1 py-4 bg-slate-800 text-slate-300 rounded-xl">취소</button>
                    <button id="delete-confirm-btn" class="flex-1 py-4 bg-rose-600 text-white rounded-xl">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWm2UcNKQnI6dHx1TAs3m-I1kxiulZI48",
            authDomain: "secu-info-technical-support.firebaseapp.com",
            projectId: "secu-info-technical-support",
            storageBucket: "secu-info-technical-support.firebasestorage.app",
            messagingSenderId: "99682801120",
            appId: "1:99682801120:web:25778da4a40bd9be390785",
            measurementId: "G-TBSEFN3TNT"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "secuinfo-vacation-final"; 

        let calendar;
        let selectedDate = null;
        let currentUser = null;
        let eventToDelete = null;

        const modal = document.getElementById('modal-overlay');
        const deleteModal = document.getElementById('delete-modal-overlay');
        const userNameInput = document.getElementById('user-name');
        const typeSelect = document.getElementById('vacation-type');
        const startTimeInput = document.getElementById('start-time');
        const endTimeInput = document.getElementById('end-time');

        const getMemberColor = (name) => {
            const palette = ['#6366f1', '#0ea5e9', '#8b5cf6', '#10b981', '#f43f5e', '#f59e0b', '#06b6d4', '#84cc16', '#d946ef', '#2dd4bf', '#22d3ee', '#818cf8'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return palette[Math.abs(hash) % palette.length];
        };

        window.toggleTimeInput = () => {
            document.getElementById('time-input-container').classList.toggle('hidden', typeSelect.value !== '시간차');
        };

        window.closeModal = () => {
            modal.style.display = 'none';
            userNameInput.value = '';
            typeSelect.value = '연차';
            toggleTimeInput();
        };

        window.closeDeleteModal = () => {
            deleteModal.style.display = 'none';
        };

        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (err) { console.error(err); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                if (!calendar) setupCalendar();
            }
        });

        const setupCalendar = () => {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                headerToolbar: { 
                    left: 'prev,next today', 
                    center: 'title', 
                    right: 'dayGridMonth,timeGridWeek' 
                },
                slotMinTime: '08:00:00', slotMaxTime: '17:00:00',
                height: 'auto',
                dateClick: (info) => {
                    selectedDate = info.dateStr;
                    modal.style.display = 'flex';
                    userNameInput.focus();
                },
                eventClick: (info) => {
                    eventToDelete = info.event;
                    document.getElementById('delete-msg').innerText = `'${info.event.title}' 연차 계획을 취소하시겠습니까?`;
                    deleteModal.style.display = 'flex';
                }
            });
            calendar.render();
            startSync();
        };

        const startSync = () => {
            if (!currentUser) return;
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'vacations');
            onSnapshot(q, (snapshot) => {
                const events = snapshot.docs.map(doc => {
                    const d = doc.data();
                    const memberColor = getMemberColor(d.name);
                    let isAllDay = true, start = d.date, end = null;

                    if (d.type === '오전반차') { isAllDay = false; start = d.date + 'T08:00:00'; end = d.date + 'T12:00:00'; }
                    else if (d.type === '오후반차') { isAllDay = false; start = d.date + 'T13:00:00'; end = d.date + 'T17:00:00'; }
                    else if (d.type === '시간차') { isAllDay = false; start = d.date + 'T' + d.startTime + ':00'; end = d.date + 'T' + d.endTime + ':00'; }

                    return {
                        id: doc.id,
                        title: `${d.name} (${d.type})`,
                        start: isAllDay ? d.date : start,
                        end: end,
                        allDay: isAllDay,
                        backgroundColor: memberColor,
                        textColor: '#ffffff',
                        borderColor: 'transparent'
                    };
                });
                calendar.removeAllEvents();
                calendar.addEventSource(events);
            });
        };

        const handleSave = async () => {
            const name = userNameInput.value.trim();
            const type = typeSelect.value, start = startTimeInput.value, end = endTimeInput.value;
            if (!name) return alert("성함을 입력해 주세요.");
            if (type === '시간차' && (!start || !end || start >= end)) return alert("시간 범위를 확인해 주세요.");

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'vacations');
                await addDoc(colRef, {
                    name, type, 
                    startTime: type === '시간차' ? start : null,
                    endTime: type === '시간차' ? end : null,
                    date: selectedDate,
                    userId: currentUser.uid,
                    createdAt: new Date().toISOString()
                });
                closeModal();
            } catch (err) { console.error(err); }
        };

        const handleDelete = async () => {
            if (!eventToDelete) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'vacations', eventToDelete.id);
                await deleteDoc(docRef);
                closeDeleteModal();
            } catch (err) { console.error(err); }
        };

        setInterval(() => {
            const now = new Date();
            const display = document.getElementById('current-time-display');
            if (display) display.innerText = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        }, 1000);

        document.getElementById('confirm-btn').onclick = handleSave;
        document.getElementById('delete-confirm-btn').onclick = handleDelete;
        window.onload = initAuth;
    </script>
</body>
</html>
